<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Clicker Hero</title>
        <!-- Import Tailwind CSS -->
        <script
                src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="../assets/css/index.css">
        <!--  Import Font Awesome  -->
        <script src="https://kit.fontawesome.com/c0f92099a8.js"
                crossorigin="anonymous"></script>

        <style type="text/tailwindcss">
            @theme {
                --color-main: #FF5733;
                --color-sub: #FFC300;
                --color-text: #2D2D2D;
                --color-vanilla: #f5f4fc;
                --color-dark-bg: #1e293b;
                --font-default: 'Quicksand', sans-serif;
                --font-title: 'Fredoka', sans-serif;
            }

            @layer base {
                * {
                    @apply font-default scroll-smooth;
                }

                body {
                    @apply bg-dark-bg
                }

                header {
                    @apply flex justify-between items-center py-4 px-8 bg-gray-800/70 text-white sticky top-0
                    bg-white/80
                    dark:bg-dark-bg/90 backdrop-blur-md z-50 [&_nav]:flex [&_nav]:gap-8 [&_nav]:*:hover:text-main
                    transition-colors duration-300;
                }

                main {
                    @apply flex flex-col p-4 gap-4;
                }

                footer {

                }
            }

            @layer components {
                .highlight-text {
                    @apply text-sub transition-colors duration-300;
                }

                /*Navbar*/
                .active {
                    @apply font-bold text-main;
                }

                .active::after {
                    content: "";
                    @apply absolute bottom-0 left-0 w-full h-0.5;
                }

                /*Button*/
                .btn {
                    @apply bg-main hover:bg-main/80 text-white px-8 py-4 rounded-2xl font-bold font-title
                    transition-all
                    transform hover:scale-105 shadow-lg shadow-main/20;
                }

                .btn-sub {
                    @apply bg-transparent border-2 border-white/20 hover:border-sub text-white px-8 py-4 rounded-2xl
                    font-bold font-title transition-all;
                }

                /* Game Card Styling */
                .game-card {
                    @apply p-6 rounded-[2.5rem] bg-white/5 border border-white/10 flex flex-col justify-between gap-4
                    transition-all duration-500 hover:-translate-y-3 hover:border-main hover:bg-white/[0.08] hover:shadow-2xl hover:shadow-main/10;
                }

                .image-container {
                    @apply relative aspect-[16/10] rounded-[1.5rem] bg-gradient-to-br from-gray-800 to-gray-900 overflow-hidden flex items-center justify-center;
                }

                .game-card:hover .game-icon {
                    @apply scale-125 rotate-12 text-main;
                }

                .game-icon {
                    @apply text-6xl text-white/20 transition-all duration-500;
                }

                /*  Edit Modal  */
                .edit-modal {
                    @apply fixed top-0 left-0 w-full h-full bg-black/50 flex items-center justify-center;
                }

                .edit-modal form {
                    @apply p-6 rounded-[2.5rem] bg-white/5 border border-white/10 flex flex-col justify-between gap-4
                    transition-all duration-500 w-xl mx-4;
                }

                .edit-modal form input {
                    @apply p-2 rounded-lg bg-white/5 border border-white/10 text-white;
                }
            }
        </style>
    </head>
    <body onload="showNameModal()">
        <header>
            <a href="../index.html" class="flex items-center gap-2 text-sm md:text-lg"><i
                    class="fa-solid fa-arrow-left"></i>Back to
                Home</a>
            <h1 onclick="clickShowNameModal()" class="text-lg md:text-2xl font-title font-bold cursor-pointer" id="playerName"><i
                    class="fa-solid fa-pencil"></i>Random Player</h1>
        </header>

        <main>
            <h2 class="text-2xl font-title font-bold text-center text-white">Click Hero</h2>
            <section id="game-container"
                    class="w-full max-w-4xl mx-auto mt-10 p-6 rounded-[2.5rem] bg-white/5 border border-white/10 flex flex-col justify-between gap-4">



            </section>

            <section id="gameNav-container" class="w-full max-w-4xl mx-auto flex justify-between">
                <a href="pokemon.html" class="flex items-center gap-2 btn-sub">
                    <i class="fa-solid fa-arrow-left"></i>
                    Pokemon
                </a>
                <a href="rps.html" id="next" class="btn">
                    RPS
                    <i class="fa-solid fa-arrow-right"></i>
                </a>
            </section>
        </main>

        <footer>

        </footer>

        <div class="edit-modal hidden">
            <form onsubmit="submitName()">
                <div class="flex justify-between">
                    <h2 class="text-white text-lg font-bold">Edit Player Name</h2>
                    <button onclick="clickShowNameModal()"
                            class="text-white text-md text-end cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <label class="text-white" for="name">Player Name</label>
                <input type="text" name="playerName" id="name" placeholder="Input Player Name" required>
                <button class="btn-sub" type="submit">Save</button>
            </form>
        </div>
        <script src="../assets/javascript/games.js"></script>
    </body>
</html>

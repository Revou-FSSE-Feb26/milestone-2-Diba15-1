<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <!-- make website responsive with meta viewport -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Clicker Hero</title>
        <!-- Import Tailwind CSS -->
        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="../assets/css/index.css">
        <!--  Import Font Awesome  -->
        <script src="https://kit.fontawesome.com/c0f92099a8.js"
            crossorigin="anonymous"></script>

        <style type="text/tailwindcss">
            @theme {
                --color-main: #FF5733;
                --color-sub: #FFC300;
                --color-text: #2D2D2D;
                --color-vanilla: #f5f4fc;
                --color-dark-bg: #1e293b;
                --font-default: 'Quicksand', sans-serif;
                --font-title: 'Fredoka', sans-serif;
            }

            @layer base {
                * {
                    @apply font-default scroll-smooth;
                }

                body {
                    @apply bg-dark-bg
                }

                header {
                    @apply flex justify-between items-center py-4 px-8 text-white sticky top-0
                    bg-transparent backdrop-blur-md z-50 [&_nav]:flex [&_nav]:gap-8 [&_nav]:*:hover:text-main
                    transition-colors duration-300;
                }

                main {
                    @apply flex flex-col p-4 gap-4;
                }
            }

            @layer components {
                /*Button*/
                .btn {
                    @apply bg-main hover:bg-main/80 text-white px-8 py-4 rounded-2xl font-bold font-title
                    transition-all
                    transform hover:scale-105 shadow-lg shadow-main/20;
                }

                .btn-sub {
                    @apply bg-transparent border-2 border-white/20 hover:border-sub text-white px-8 py-4 rounded-2xl
                    font-bold font-title transition-all;
                }

                /*  Edit Modal  */
                .edit-modal {
                    @apply fixed top-0 left-0 w-full h-full bg-black/50 flex items-center justify-center;
                }

                .edit-modal form {
                    @apply p-6 rounded-[2.5rem] bg-dark-bg border border-white/10 flex flex-col justify-between gap-4
                    transition-all duration-500 w-xl mx-4;
                }

                .edit-modal form input {
                    @apply p-2 rounded-lg bg-white/5 border border-white/10 text-white;
                }

                .hero-button {
                    @apply rounded-full font-title text-2xl text-white transition-all duration-75 inset-shadow-sm
                    inset-shadow-black/50 font-bold bg-main py-16 px-4 border-b-4 border-black/20 active:border-b-0;
                }

                .hero-button.auto-pressing, .hero-button:active {
                    @apply translate-y-1 shadow-md scale-95 bg-sub;
                    box-shadow: 0 0 20px rgba(255, 195, 0, 0.6);
                }
            }
        </style>
    </head>
    <body onload="initGames()">
        <header>
            <a href="../index.html"
                class="flex items-center gap-2 text-sm md:text-lg"><i
                    class="fa-solid fa-arrow-left"></i>Back to
                Home</a>
            <div onclick="clickShowNameModal()" class="flex gap-2 items-center">
                <i class="fa-solid fa-pencil"></i>
                <h1
                    class="text-lg md:text-2xl font-title font-bold cursor-pointer"
                    id="playerName">Random Player</h1>
            </div>
        </header>

        <main>
            <!-- Background Decor -->
            <div
                class="absolute z-0 bottom-20 right-20 w-64 h-64 bg-main opacity-20 blur-[100px] rounded-full"></div>
            <div
                class="absolute z-0 top-20 left-20 w-64 h-64 bg-main opacity-20 blur-[100px] rounded-full"></div>

            <!-- Clicker Game Container -->
            <section id="clicker-container"
                class="w-full max-w-4xl min-h-[400px] mx-auto mt-10 p-6 rounded-[2.5rem] bg-white/5 border border-white/10 flex flex-col justify-center items-center gap-4">
                <div id="play-container"
                    class="flex flex-col items-center justify-center gap-4">
                    <h3
                        class="text-2xl font-title font-bold text-center text-white">Click
                        Hero</h3>
                    <p
                        class="text-gray-300 text-center text-lg font-semibold">🖥️
                        Recommended play in desktop for best experience!</p>
                    <button onclick="playClickHero()"
                        class="btn cursor-pointer">Play Now!</button>
                </div>

                <div
                    class="font-default font-semibold text-2xl text-white text-center hidden"
                    id="loading">
                    <div class="animate-bounce">️⚔️ 👆</div>
                    <p>Loading...</p>
                </div>

                <div id="game-container"
                    class="flex flex-col justify-center items-center gap-8 w-full hidden">
                    <!--Header Like Score and stage-->
                    <div id="gameHeaderContainer"
                        class="flex justify-center w-full">
                        <div
                            class="font-title text-2xl text-white text-center font-bold"><span
                                id="playerScore">0
                            </span></div>
                    </div>
                    <div id="gameDisplayContainer"
                        class="flex flex-col justify-around items-center gap-4">
                        <h2 id="praiseText"
                            class="font-title text-white text-2xl font-bold"></h2>
                        <button onclick="clickHero()" id="hero-btn"
                            class="hero-button">PUSH HERO</button>
                    </div>
                    <!--Choice Container-->
                    <div id="playerChoiceContainer"
                        class="flex flex-col md:flex-row gap-4 w-full">
                        <div onclick="upgradeATK()"
                            class="btn-sub w-full text-xl md:text-2xl cursor-pointer flex flex-col gap-2 items-center text-center">
                            <h2 id="atk-price">10</h2>
                            <h3>⚔️</h3>
                            <h4>Upgrade ATK <span id="atk-max">1/10</span></h4>
                        </div>
                        <div onclick="addAuto()"
                            class="btn-sub w-full text-xl md:text-2xl cursor-pointer flex flex-col gap-2 items-center">
                            <h2 id="auto-price">200</h2>
                            <h3>👆</h3>
                            <h4>Auto Click <span
                                    id="auto-status">OFF</span></h4>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Game Navigation -->
            <section id="gameNav-container"
                class="w-full max-w-4xl mx-auto flex flex-col sm:flex-row gap-4 sm:gap-0 justify-between">
                <a href="pokemon.html" class="flex items-center gap-2 btn-sub">
                    <i class="fa-solid fa-arrow-left"></i>
                    Pokemon
                </a>
                <a href="rps.html" id="next" class="btn">
                    RPS
                    <i class="fa-solid fa-arrow-right"></i>
                </a>
            </section>
        </main>

        <footer>
            <div
                class="flex justify-center items-center py-4 px-8 bg-gray-800/70 text-white">
                <p>© 2026 Revofun. All rights reserved.</p>
            </div>
        </footer>

        <!--Modal for change display name-->
        <div class="edit-modal hidden">
            <form onsubmit="submitName(event)">
                <div class="flex justify-between">
                    <h2 class="text-white text-lg font-bold">Edit Player
                        Name</h2>
                    <button onclick="clickShowNameModal()" title="Close Button"
                        type="button"
                        class="text-white text-md text-end cursor-pointer"><i
                            class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <label class="text-white" for="name">Player Name</label>
                <input type="text" name="playerName" id="name"
                    placeholder="Input Player Name" required>
                <button class="btn-sub" type="submit">Save</button>
            </form>
        </div>
        <script src="../assets/javascript/games.js"></script>
    </body>
</html>
